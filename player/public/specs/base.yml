openapi: 3.0.1
info:
  title: Bondsmith Savings Public APIs
  description: Public APIs for Bondsmith Savings
  contact:
    name: API Support
    url: https://bondsmith.co.uk/support
    email: support@bondsmith.co.uk
  version: v1
externalDocs:
  url: https://bondsmith.stoplight.io/docs/savings
servers:
- url: https://api.sandbox.b7h.io
  description: sandbox
- url: https://api.bondsmith.com
  description: production
security:
- OAuth2:
  - public-api/default
tags:
- name: Savings
- name: Customers
- name: Instructions
- name: Payment Accounts
- name: Settlement
- name: Webhooks Demo
- name: Sandbox Only
paths:
  /v1.1/customers:
    get:
      tags:
      - Customers
      summary: List all customers
      description: This operation returns a paginated list of all customers.
      operationId: ListCustomers__V1_1
      parameters:
      - name: name
        in: query
        schema:
          type: string
          description: The name of the customer to return. Does a partial search across
            full name
          nullable: true
      - name: customerIds
        in: query
        schema:
          type: array
          description: The customer ids of the customers to be returned
          nullable: true
          items:
            type: string
            description: The unique identifier of the customer
            format: uuid
      - name: verificationStatus
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/CustomerStatusV1_1'
          - description: Return only customers in the specifiied verification statuses
      - name: email
        in: query
        schema:
          type: string
          description: Return customers by a specific email address
          nullable: true
      - name: externalId
        in: query
        schema:
          type: string
          description: Return customer by specifying your own reference that you provided
            in the create customer action
          nullable: true
      - name: paginatedProperty
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/CustomerPaginatedProperty'
          - description: The property to sort the response by
      - name: take
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          description: The number of records to return for pagination
          format: int32
          nullable: true
      - name: skip
        in: query
        schema:
          minimum: 0
          type: integer
          description: The number of records to skip for pagination
          format: int32
          nullable: true
      - name: orderAscDesc
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/OrderAscDesc'
          - description: The order in which to sort the paginatedProperty by
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BondsmithPage_ExternalCustomerResponseV1_1_'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
      - Customers
      summary: Create a new customer
      description: |
        Creates a new customer. To create a customer relating to an individual, specify an `accountHolderType` of `INDIVIDUAL` and provide the "person" attribute. For a joint account, specify an `accountHolderType` of `JOINT` and provide both the "person" and "additionalPerson" attributes.
        For companies, trusts or charities, specify an accountHolderType of `COMPANY`, `CHARITY` or `TRUST`, and provide the "legalEntity" attribute. Where Bondsmith is performing the KYC, the customer will be in a PENDING state until the necessary KYC checks have been performed.
      operationId: CreateCustomer__V1_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerRequestV1_1'
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalBatchCustomerInstructionResponse'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1.1/customers/external/{externalRef}:
    get:
      tags:
      - Customers
      summary: Get a customer by an external reference
      description: "This operations returns the details of a customer, look up using\
        \ an external reference."
      operationId: GetCustomerByExternalRef__V1_1
      parameters:
      - name: externalRef
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalCustomerResponseV1_1'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1.1/customers/instructions:
    get:
      tags:
      - Instructions
      summary: List all instructions
      description: This operation returns a paginated list of all instructions
      operationId: ListInstructions__V1_1
      parameters:
      - name: productId
        in: query
        schema:
          type: string
          format: uuid
          nullable: true
      - name: bankId
        in: query
        schema:
          type: string
          format: uuid
          nullable: true
      - name: instructionType
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/OrderType'
      - name: instructionStatus
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/InstructionStatusV1_1'
      - name: createdFrom
        in: query
        schema:
          type: string
          format: date
          nullable: true
      - name: createdTo
        in: query
        schema:
          type: string
          format: date
          nullable: true
      - name: paginatedProperty
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ExternalProductOrderPaginatedProperty'
      - name: take
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          description: The number of records to return for pagination
          format: int32
          nullable: true
      - name: skip
        in: query
        schema:
          minimum: 0
          type: integer
          description: The number of records to skip for pagination
          format: int32
          nullable: true
      - name: orderAscDesc
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/OrderAscDesc'
          - description: The order in which to sort the paginatedProperty by
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BondsmithPage_ExternalInstructionResponseV1_1_'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1.1/customers/instructions/cash:
    get:
      tags:
      - Instructions
      summary: List cash withdrawal instructions for a customer
      description: This operation returns a paginated list of all cash withdrawal
        instructions created for a customer.
      operationId: ListCashAccountWithdrawalInstructions__V1
      parameters:
      - name: createdBefore
        in: query
        schema:
          type: string
          format: date
          nullable: true
      - name: createdAfter
        in: query
        schema:
          type: string
          format: date
          nullable: true
      - name: updatedBefore
        in: query
        schema:
          type: string
          format: date
          nullable: true
      - name: updatedAfter
        in: query
        schema:
          type: string
          format: date
          nullable: true
      - name: currencyCode
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/CurrencyCode'
      - name: amount
        in: query
        schema:
          minimum: 0
          type: number
          nullable: true
      - name: payoutInstructionStatus
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/CashInstructionStatus'
      - name: cashInstructionReference
        in: query
        schema:
          minLength: 1
          type: string
          nullable: true
      - name: platformId
        in: query
        schema:
          type: string
          format: uuid
          nullable: true
      - name: productAccountId
        in: query
        schema:
          type: string
          format: uuid
          nullable: true
      - name: customerId
        in: query
        schema:
          type: string
          format: uuid
          nullable: true
      - name: payoutInstructionId
        in: query
        schema:
          type: string
          format: uuid
          nullable: true
      - name: firstName
        in: query
        schema:
          minLength: 1
          type: string
          nullable: true
      - name: lastName
        in: query
        schema:
          minLength: 1
          type: string
          nullable: true
      - name: accountName
        in: query
        schema:
          minLength: 1
          type: string
          nullable: true
      - name: paginatedProperty
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/CashAccountInstructionPaginatedProperty'
      - name: take
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          description: The number of records to return for pagination
          format: int32
          nullable: true
      - name: skip
        in: query
        schema:
          minimum: 0
          type: integer
          description: The number of records to skip for pagination
          format: int32
          nullable: true
      - name: orderAscDesc
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/OrderAscDesc'
          - description: The order in which to sort the paginatedProperty by
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BondsmithPage_ExternalCashAccountInstructionResponse_'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1.1/customers/product/{productId}:
    get:
      tags:
      - Customers
      summary: Get customers by product
      description: Get all customers who have an account for a given product
      operationId: GetCustomersByProduct__V1_1
      parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: string
          description: The unique identifier for the savings product
          format: uuid
      - name: paginatedProperty
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/CustomerPaginatedProperty'
      - name: balanceThreshold
        in: query
        schema:
          type: number
          nullable: true
      - name: take
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          description: The number of records to return for pagination
          format: int32
          nullable: true
      - name: skip
        in: query
        schema:
          minimum: 0
          type: integer
          description: The number of records to skip for pagination
          format: int32
          nullable: true
      - name: orderAscDesc
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/OrderAscDesc'
          - description: The order in which to sort the paginatedProperty by
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BondsmithPage_ExternalMinimalCustomerResponse_'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1.1/customers/{customerId}:
    get:
      tags:
      - Customers
      summary: Get a customer
      description: "This operation returns the details of a customer, looked up using\
        \ the unique ID."
      operationId: GetCustomer__V1_1
      parameters:
      - name: customerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalCustomerResponseV1_1'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
      - Customers
      summary: Update a Customer
      description: Updates all of a customer's data using their customer ID
      operationId: UpdateCustomer__V1_1
      parameters:
      - name: customerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerRequestV1_1'
        required: true
      responses:
        "200":
          description: Success
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
      - Customers
      summary: Patch a customer
      description: Update some of a customer's data using their customer ID
      operationId: PatchCustomer__V1_1
      parameters:
      - name: customerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCustomerRequest'
        required: true
      responses:
        "200":
          description: Success
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1.1/customers/{customerId}/accounts:
    get:
      tags:
      - Savings
      summary: List customer balances
      description: "This operation returns a paginated list of all savings accounts\
        \ a customer has deposits with, as well as their available balance and invested\
        \ balance."
      operationId: ListCustomerSavingsAccounts__V1
      parameters:
      - name: customerId
        in: path
        required: true
        schema:
          allOf:
          - $ref: '#/components/schemas/CustomerUid'
          - description: The unique identifier for the customer returned from the
              create customer endpoint
      - name: taxWrapper
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/TaxWrapper'
          - description: Return savings accounts with the specified tax wrapper
      - name: currency
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/CurrencyCode'
          - description: Return savings accounts in the specified currency
      - name: balanceMin
        in: query
        schema:
          type: number
          description: Return savings accounts with a balance above this value
          nullable: true
      - name: balanceMax
        in: query
        schema:
          type: number
          description: Return savings accounts with a balance below this value
          nullable: true
      - name: startDate
        in: query
        schema:
          type: string
          description: Return savings accounts created after this date
          format: date
          nullable: true
      - name: endDate
        in: query
        schema:
          type: string
          description: Return savings accounts created before this date
          format: date
          nullable: true
      - name: paginatedProperty
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/CustomerAccountPaginatedProperty'
          - description: The property to sort the response by
      - name: take
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          description: The number of records to return for pagination
          format: int32
          nullable: true
      - name: skip
        in: query
        schema:
          minimum: 0
          type: integer
          description: The number of records to skip for pagination
          format: int32
          nullable: true
      - name: orderAscDesc
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/OrderAscDesc'
          - description: The order in which to sort the paginatedProperty by
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerSavingsAccountBalanceResponse'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1.1/customers/{customerId}/accounts/{savingsAccountId}:
    get:
      tags:
      - Savings
      summary: Get customer savings account
      description: This operation returns a single savings account for the customer
      operationId: GetAccount__V1_1
      parameters:
      - name: customerId
        in: path
        required: true
        schema:
          allOf:
          - $ref: '#/components/schemas/CustomerUid'
          - description: The unique identifier for the customer
      - name: savingsAccountId
        in: path
        required: true
        schema:
          allOf:
          - $ref: '#/components/schemas/ProductAccountUid'
          - description: The unique identifier for the customer's savings account
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerSavingsAccountResponseV1_1'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1.1/customers/{customerId}/accounts/{savingsAccountId}/fscs-rate-history:
    get:
      tags:
      - Savings
      summary: Get bank sweep rate history
      description: This operation returns a paginated list of interest rates and FSCS
        protection amounts for savings accounts created under the Bank Sweep service
      operationId: ListRateFscsHistory__V1_1
      parameters:
      - name: customerId
        in: path
        required: true
        schema:
          allOf:
          - $ref: '#/components/schemas/CustomerUid'
          - description: The unique identifier for the customer
      - name: savingsAccountId
        in: path
        required: true
        schema:
          allOf:
          - $ref: '#/components/schemas/ProductAccountUid'
          - description: The unique identifier for the customer's savings account
      - name: onOrAfterDate
        in: query
        schema:
          type: string
          format: date
          nullable: true
      - name: beforeDate
        in: query
        schema:
          type: string
          format: date
          nullable: true
      - name: paginatedProperty
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/RateAndFscsPaginatedProperty'
      - name: take
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          description: The number of records to return for pagination
          format: int32
          nullable: true
      - name: skip
        in: query
        schema:
          minimum: 0
          type: integer
          description: The number of records to skip for pagination
          format: int32
          nullable: true
      - name: orderAscDesc
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/OrderAscDesc'
          - description: The order in which to sort the paginatedProperty by
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BondsmithPage_ExternalRateFscsHistoryResponse_'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1.1/customers/{customerId}/accounts/{savingsAccountId}/instructions:
    post:
      tags:
      - Instructions
      summary: Create instruction for a savings account
      description: This operation creates an operation for a specific savings account
      operationId: CreateInstructionForSavingsAccount__V1_1
      parameters:
      - name: customerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: savingsAccountId
        in: path
        required: true
        schema:
          type: string
          description: The unique identifier of the savings account
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstructionRequestV1_1'
        required: true
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InstructionResponseV1_1'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
