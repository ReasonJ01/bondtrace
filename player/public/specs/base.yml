  /v1.2/customers/{customerId}/transactions/{currencyCode}:
    get:
      tags:
      - Customers
      summary: List all transactions
      description: "This operation returns a combined list of all payment and savings\
        \ account transactions for a given currency, including balances"
      operationId: ListCustomerTransactions__V1_2
      parameters:
      - name: customerId
        in: path
        required: true
        schema:
          type: string
          description: The unique identifier of the customer
          format: uuid
      - name: currencyCode
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/CurrencyCode'
      - name: includeTransactionTypes
        in: query
        schema:
          type: array
          description: "Array of transaction types to include in the results. Only\
            \ the transactions matching the specified types will be included in the\
            \ response. If this parameter is omitted or empty, no inclusion filtering\
            \ is applied."
          nullable: true
          items:
            $ref: '#/components/schemas/TransactionType'
      - name: excludeTransactionTypes
        in: query
        schema:
          type: array
          description: "Array of transaction types to exclude from the results. Transactions\
            \ matching any of the specified types will be omitted from the response.\
            \ If this parameter is omitted or empty, no exclusion filtering is applied."
          nullable: true
          items:
            $ref: '#/components/schemas/TransactionType'
      - name: valueDateFrom
        in: query
        schema:
          type: string
          description: "Date to filter from. Only transactions with a date greater\
            \ than or equal to this value will be included in the response. If this\
            \ parameter is omitted, no date filtering is applied."
          format: date
          nullable: true
      - name: valueDateTo
        in: query
        schema:
          type: string
          description: "Date to filter to. Only transactions with a date less than\
            \ or equal to this value will be included in the response. If this parameter\
            \ is omitted, no date filtering is applied."
          format: date
          nullable: true
      - name: valueAmountFrom
        in: query
        schema:
          type: number
          description: "Amount to filter from. Only transactions with an amount greater\
            \ than or equal to this value will be included in the response. If this\
            \ parameter is omitted, no amount filtering is applied."
          nullable: true
      - name: valueAmountTo
        in: query
        schema:
          type: number
          description: "Amount to filter to. Only transactions with an amount less\
            \ than or equal to this value will be included in the response. If this\
            \ parameter is omitted, no amount filtering is applied."
          nullable: true
      - name: productUid
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/PlatformProductUid'
          - description: "The product uid to filter on. Only transactions with a product\
              \ uid matching this value will be included in the response. If this\
              \ parameter is omitted, no product filtering is applied."
      - name: accountType
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ExternalPaymentAccountType'
          - description: "The account type to filter on. Only transactions associated\
              \ with the specified account type will be included in the response.\
              \ If this parameter is omitted, no account type filtering is applied."
      - name: paginatedProperty
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/CustomerTransactionPaginatedProperty'
          - description: Paginated property to sort by.
      - name: take
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          description: The number of records to return for pagination
          format: int32
          nullable: true
      - name: skip
        in: query
        schema:
          minimum: 0
          type: integer
          description: The number of records to skip for pagination
          format: int32
          nullable: true
      - name: orderAscDesc
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/OrderAscDesc'
          - description: The order in which to sort the paginatedProperty by
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BondsmithPage_ExternalCustomerTransactionResponse_'
        "400":
          description: Bad request
          content:
            application/json:
