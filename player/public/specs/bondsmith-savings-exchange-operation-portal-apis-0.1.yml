          $ref: '#/components/schemas/WebhookEventType'
        eventState:
          $ref: '#/components/schemas/WebhookEventState'
        eventPayload:
          type: string
        createdAt:
          type: string
          format: date-time
    WebhookEventState:
      type: string
      enum:
      - RESPONSE_RECEIVED
      - AWAITING_RESPONSE
      - FAILED
    WebhookEventType:
      type: string
      enum:
      - INSTRUCTION_STATE_CHANGED
      - ACCOUNT_CREATED
      - CUSTOMER_STATE_CHANGED
      - CUSTOMER_PRODUCT_ACCOUNT_DEPOSIT
      - CUSTOMER_PRODUCT_ACCOUNT_WITHDRAWAL
      - INTEREST_RATE_CHANGED
      - CASH_ACCOUNT_TRANSACTION_COMPLETE
      - CASH_TRANSACTION
      - CASH_ACCOUNT_PAYOUT_FAILED
      - INTEREST_REALISED
      - SAVINGS_TRANSACTION
      - CUSTOMER_DOCUMENT_CREATED
      - NOMINATED_ACCOUNT_CHANGED
      - REJECTED_TRANSACTION
      - KYC_INFO_REQUIRED
      - CUSTOMER_DATA_CHANGED
    WebhookSubscriptionResponse:
      required:
      - webhooks
      type: object
      properties:
        webhooks:
          type: array
          items:
            $ref: '#/components/schemas/Webhook'
    WebhookVersion:
      type: string
      enum:
      - VERSION_1
      - VERSION_1_1
      - VERSION_1_2
    WithdrawalRequest:
      required:
      - amount
      - type
      type: object
      properties:
        type:
          $ref: '#/components/schemas/WithdrawalType'
        amount:
          minimum: 0
          type: number
    WithdrawalType:
      type: string
      enum:
      - FULL
      - PARTIAL
  securitySchemes:
    Authorization:
      type: http
      scheme: bearer
      bearerFormat: JWT
