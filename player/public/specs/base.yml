          type: string
          description: Second line of the address
          nullable: true
        addressLine3:
          type: string
          description: Third line of the address
          nullable: true
        addressLine4:
          type: string
          description: Fourth line of the address - town or city. Required even if
            lines 2 and 3 are not specified
          nullable: true
        postCode:
          maxLength: 8
          minLength: 1
          type: string
          description: UK postcode of the address - town or city
        country:
          maxLength: 3
          type: string
          description: Country for this address. Use ISO-3166-1 alpha-3 codes such
            as GBR for United Kingdom
    AddressResponse:
      required:
      - addressLine1
      - addressLine4
      - country
      - postCode
      type: object
      properties:
        addressLine1:
          type: string
        addressLine2:
          type: string
          nullable: true
