  /v1/products:
    get:
      tags:
      - Savings
      summary: List savings products
      description: This operation returns a paginated list of all available savings
        products. Use it to show your users which savings products are available to
        open
      operationId: ListAllSavingsProducts__V1
      parameters:
      - name: productId
        in: query
        schema:
          type: string
          description: The unique identifier of the savings product
          format: uuid
          nullable: true
      - name: name
        in: query
        schema:
          type: string
          description: The name of the savings product
          nullable: true
      - name: productType
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/ProductType'
          - description: The type of savings product e.g. easy access or fixed term
      - name: bankId
        in: query
        schema:
          type: string
          description: The unique identifier of the bank
          format: uuid
          nullable: true
      - name: taxWrapper
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/TaxWrapper'
          - description: The tax wrappers the savings product is eligible to be held
              within
      - name: depositRequirementMin
        in: query
        schema:
          type: number
          description: The minimum deposit required to open the savings product
          nullable: true
      - name: depositRequirementMax
        in: query
        schema:
          type: number
          description: The maximum deposit that can be made into the savings product
          nullable: true
      - name: accountHolderType
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/AccountHolderType'
          - description: The types of customers eligible for the savings product
      - name: paginatedProperty
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/BankProductPaginatedProperty'
          - description: The product to sort the returned savings products by
      - name: take
        in: query
        schema:
          maximum: 1000
          minimum: 1
          type: integer
          description: The number of records to return for pagination
          format: int32
          nullable: true
      - name: skip
        in: query
        schema:
          minimum: 0
          type: integer
          description: The number of records to skip for pagination
          format: int32
          nullable: true
      - name: orderAscDesc
        in: query
        schema:
          nullable: true
          allOf:
          - $ref: '#/components/schemas/OrderAscDesc'
          - description: The order in which to sort the paginatedProperty by
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BondsmithPage_ExternalProductResponse_'
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
